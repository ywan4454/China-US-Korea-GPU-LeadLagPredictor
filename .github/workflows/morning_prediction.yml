name: Morning Prediction (A-Share Lead-Lag)

on:
  schedule:
    # 北京时间 09:00 = UTC 01:00，仅工作日（周一至周五）
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest

    env:
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      # 明确清空代理，防止 curl_cffi 继承 runner 环境中的任何代理配置
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning prediction
        run: python main.py
